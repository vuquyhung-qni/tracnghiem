<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Lịch Công Tác – Chi cục Hải quan KV VIII</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0d2340;--navy-mid:#163659;--navy-light:#1e4d80;
  --gold:#c9a84c;--gold-dark:#a87c20;
  --cream:#f7f3ec;--bg:#eaf0f8;--text:#1a2a3a;
  --muted:#5a7080;--border:#dde4ec;
  --shadow:0 2px 14px rgba(13,35,64,.09);--r:13px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Be Vietnam Pro",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ══ HEADER ══ */
.hd{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);padding:14px 16px;position:relative;overflow:hidden;}
.hd::before{content:"";position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(201,168,76,.13);pointer-events:none;}
.hd-inner{
  max-width:1280px;margin:0 auto;
  display:flex;align-items:center;
  position:relative;z-index:2;min-height:62px;
}
.hd-logo{width:36px;height:36px;flex-shrink:0;object-fit:contain;filter:drop-shadow(0 2px 5px rgba(0,0,0,.4));}
.hd-text{
  flex:1;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.hd-title{
  font-size:clamp(1rem,5vw,1.5rem);
  font-weight:800;letter-spacing:1px;
  text-transform:uppercase;color:#fff;
  text-align:center;
}
.hd-short{display:inline;}.hd-long{display:none;}
@media(min-width:600px){
  .hd{padding:14px 28px;}
  .hd-logo{width:52px;height:52px;}
  .hd-short{display:none;}.hd-long{display:inline;}
  .hd-title{font-size:1.5rem;}
}

/* ══ CONTROLS ══ */
.ctrl{background:#fff;padding:10px 12px 9px;box-shadow:0 2px 8px rgba(0,0,0,.07);position:sticky;top:0;z-index:100;}
.ctrl-inner{max-width:1280px;margin:0 auto;}
.row1{display:grid;grid-template-columns:1fr auto;gap:7px;align-items:center;margin-bottom:7px;}
.sw{position:relative;}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);}
.si{width:100%;padding:7px 10px 7px 32px;border:1.5px solid var(--border);border-radius:50px;font-family:inherit;font-size:.83rem;color:var(--text);outline:none;background:var(--cream);transition:border-color .18s;}
.si:focus{border-color:var(--navy-light);background:#fff;}
.si::placeholder{color:#a8b4c0;}
.btnm{padding:7px 14px;border-radius:50px;font-family:inherit;font-size:.72rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;border:2px solid transparent;cursor:pointer;white-space:nowrap;}
.btnm.hop{background:var(--navy);color:#fff;border-color:var(--navy);box-shadow:0 3px 10px rgba(13,35,64,.28);}
.btnm.tb{background:var(--gold);color:#fff;border-color:var(--gold-dark);}
.row2{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.chip{padding:5px 2px;border-radius:50px;font-size:.74rem;font-weight:600;font-family:inherit;border:2px solid var(--border);background:var(--cream);color:var(--navy-mid);cursor:pointer;text-align:center;outline:none;transition:all .15s;}
.chip:hover{border-color:var(--navy-light);background:#e8f0fb;}
.chip.on{background:var(--navy-mid);border-color:var(--navy-mid);color:#fff;}

/* ══ MAIN ══ */
#main{padding:14px 12px 28px;max-width:1280px;margin:0 auto;}
@media(min-width:860px){.ctrl{padding:11px 28px 10px;}#main{padding:18px 28px 36px;}}

/* ══ LOADING ══ */
.loading{text-align:center;padding:60px 20px;color:var(--muted);}
.spinner{width:40px;height:40px;border:4px solid #dde4ec;border-top-color:var(--navy-light);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ══ CARDS ══ */
@keyframes fu{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.card{
  background:#fff;border-radius:var(--r);margin-bottom:10px;
  box-shadow:var(--shadow);border-left:4px solid var(--navy-light);
  animation:fu .28s ease both;
  transition:transform .14s,box-shadow .14s,background .15s;
  cursor:pointer;
}
.card.tb{border-left-color:var(--gold);}
.card:hover{background:#fffbe8;transform:translateY(-2px);box-shadow:0 6px 22px rgba(13,35,64,.13);border-left-color:#e6a800;}
.card.tb:hover{background:#fff8e0;border-left-color:var(--gold-dark);}
.cb{padding:12px 14px 13px;}
.ctop{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;gap:6px;}
.cdate{display:flex;align-items:center;gap:5px;flex-wrap:wrap;flex:1;min-width:0;}
.pill{display:inline-block;padding:3px 9px;border-radius:50px;font-weight:700;white-space:nowrap;font-size:.76rem;}
.pill-date{background:#eef2f8;color:var(--navy-mid);}
.pill-thu{background:#eef2f8;color:var(--navy-mid);}
.pill-gio{background:#deeaff;color:var(--navy-light);}
.cdate.we .pill-date,.cdate.we .pill-thu{color:#c0392b;background:#fdecea;}
.cdate.we .pill-gio{color:#c0392b;background:#fdecea;}
.bdgs{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0;}
.bdg{font-size:.63rem;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.2px;}
.bdg-tb{background:#fff3cd;color:#856404;border:1px solid #ffc107;}
.bdg-per{background:#e8f4fd;color:#0d5a8a;border:1px solid #bee3f8;}
.ctitle{font-size:.9rem;font-weight:700;color:var(--navy);line-height:1.4;margin-bottom:8px;}
.cmeta{display:flex;flex-direction:column;gap:3px;}
.mrow{display:flex;align-items:flex-start;gap:5px;font-size:.75rem;color:var(--muted);line-height:1.4;}
.mrow b{font-weight:600;color:var(--text);}
.mrow em{font-style:italic;color:#8a9aaa;}
.doc-link{color:var(--navy-light);font-weight:600;font-size:.75rem;text-decoration:none;border-bottom:1px dashed var(--navy-light);}
.doc-link:hover{color:var(--gold-dark);}
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-ico{font-size:2.2rem;margin-bottom:8px;}
.err{text-align:center;padding:30px;color:#c0392b;font-size:.85rem;background:#fff;border-radius:var(--r);margin:20px;}

/* Nút toggle ALL */
.btn-all{
  padding:7px 12px;border-radius:50px;font-family:inherit;
  font-size:.72rem;font-weight:800;letter-spacing:.4px;
  border:2px solid var(--border);cursor:pointer;white-space:nowrap;
  background:var(--cream);color:var(--muted);
  transition:all .18s;
}
.btn-all.on{
  background:#27ae60;color:#fff;border-color:#219150;
  box-shadow:0 3px 10px rgba(39,174,96,.3);
}
.row1{display:grid;grid-template-columns:1fr auto auto;gap:7px;align-items:center;margin-bottom:7px;}
</style>
</head>

<div class="ctrl">
  <div class="ctrl-inner">
    <div class="row1">
      <div class="sw">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">

        </svg>
        <input class="si" id="si" type="text" placeholder="Tìm kiếm nội dung...">
      </div>
      <button class="btn-all" id="btnAll">📅 ALL</button>
      <button class="btnm hop" id="mb">📋 Lịch Họp</button>

      <button class="chip on" data-p="all">Tất cả</button>

<div id="main">
  <div class="loading">
    <div class="spinner"></div>
    <p>Đang tải lịch công tác...</p>
  </div>
</div>

<script>
var APPS_URL = "https://script.google.com/macros/s/AKfycbxnj2MrgKvkANBCvWPwlJGOhXBEUgT6fi_xFGSDvfZ06m8JIafjWWWjr2VocVALOj0/exec";
var ALL_DATA = [];
var mode = 0, person = "all", kw = "", showAll = false;
var _loadTimer = null;

function e(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function parseDate(str) {
  if (!str) return null;
  var parts = String(str).split("/");
  if (parts.length !== 3) return null;
  return new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));
}

function todayStart() {
  var d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

// Hàm callback JSONP — Apps Script gọi hàm này
function onDataLoaded(result) {
  if (_loadTimer) clearTimeout(_loadTimer);
  if (result.error) {
    document.getElementById("main").innerHTML =
      "<div class=\"err\">⚠️ Lỗi từ Apps Script: " + e(result.error) + "</div>";
    return;
  }
  ALL_DATA = result.data || [];
  render();
}

// ── Gọi Apps Script qua JSONP (bypass CORS) ──────────────
function loadData() {
  // Timeout 15 giây nếu không nhận được phản hồi
  _loadTimer = setTimeout(function() {
    document.getElementById("main").innerHTML =
      "<div class=\"err\">⚠️ Hết thời gian chờ. Vui lòng <a href=\"\" onclick=\"location.reload();return false;\">tải lại trang</a>.</div>";
  }, 15000);

  var script = document.createElement("script");
  var ts = new Date().getTime();
  script.src = APPS_URL + "?callback=onDataLoaded&ts=" + ts;
  script.onerror = function() {
    clearTimeout(_loadTimer);
    document.getElementById("main").innerHTML =
      "<div class=\"err\">⚠️ Không thể kết nối Apps Script. <a href=\"\" onclick=\"location.reload();return false;\">Thử lại</a></div>";
  };
  document.head.appendChild(script);
}

loadData();

// ── Render cards ──────────────────────────────────────────
function render(){
  var c = document.getElementById("main");
  var today = todayStart();
  var f = [];
  for(var i=0;i<ALL_DATA.length;i++){
    var it = ALL_DATA[i];
    // Lọc ngày: chỉ hiện từ hôm nay trở đi, trừ khi bật showAll
    if (!showAll) {
      var d = parseDate(it.date);
      if (d && d < today) continue;
    }
    if(mode===0 && it.tb) continue;
    if(mode===1 && !it.tb) continue;
    if(person!=="all"){
      var ok=false;
      for(var j=0;j<it.ps.length;j++) if(it.ps[j]===person){ok=true;break;}
      if(!ok) continue;
    }
    if(kw){
      var hay=(it.nd+it.tp+it.dd+it.ct+it.gc).toLowerCase();
      if(hay.indexOf(kw)===-1) continue;
    }
    f.push(it);
  }

  if(!f.length){
    c.innerHTML="<div class=\"empty\"><div class=\"empty-ico\">🔍</div><p>Không tìm thấy lịch công tác phù hợp.</p></div>";
    return;
  }

  var h="";
  for(var i=0;i<f.length;i++){
    var it=f[i], delay=i*30;
    var isWE=(it.thu==="Thứ Bảy"||it.thu==="Chủ Nhật");
    var bdg=it.tb?"<span class=\"bdg bdg-tb\">Trực ban</span>":"";
    for(var pi=0;pi<it.ps.length;pi++) bdg+="<span class=\"bdg bdg-per\">Đ/c "+e(it.ps[pi])+"</span>";

    h+="<div class=\"card"+(it.tb?" tb":"")+"\" style=\"animation-delay:"+delay+"ms\">"
      +"<div class=\"cb\"><div class=\"ctop\">"
      +"<div class=\"cdate"+(isWE?" we":"")+"\"><span class=\"pill pill-date\">"+e(it.date)+"</span>"
      +"<span class=\"pill pill-thu\">"+e(it.thu)+"</span>"
      +"<span class=\"pill pill-gio\">⏰ "+e(it.bd)+"–"+e(it.kt)+"</span></div>"
      +"<div class=\"bdgs\">"+bdg+"</div></div>"
      +"<div class=\"ctitle\">"+e(it.nd)+"</div>"
      +"<div class=\"cmeta\">";
    if(it.dd) h+="<div class=\"mrow\"><span>📍</span><b>"+e(it.dd)+"</b></div>";
    if(it.ct) h+="<div class=\"mrow\"><span>👤</span><span>"+e(it.ct)+"</span></div>";
    if(it.tp) h+="<div class=\"mrow\"><span>👥</span><em>"+e(it.tp)+"</em></div>";
    if(it.gc) h+="<div class=\"mrow\"><span>📝</span><em>"+e(it.gc)+"</em></div>";
    if(it.tl) h+="<div class=\"mrow\"><span>📎</span><a class=\"doc-link\" href=\""+e(it.tl)+"\" target=\"_blank\">Xem tài liệu</a></div>";
    h+="</div></div></div>";
  }
  c.innerHTML = h;
}

// ── Sự kiện ──────────────────────────────────────────────
document.getElementById("btnAll").onclick = function(){
  showAll = !showAll;
  this.textContent = showAll ? "📅 ALL ✓" : "📅 ALL";
  this.classList.toggle("on", showAll);
  render();
};
document.getElementById("mb").onclick = function(){
  mode = mode===0 ? 1 : 0;
  this.textContent = mode===0 ? "📋 Lịch Họp" : "🔔 Trực Ban";
  this.className = "btnm " + (mode===0 ? "hop" : "tb");
  render();
};
document.getElementById("pr").onclick = function(ev){
  var btn = ev.target.closest(".chip");
  if(!btn) return;
  person = btn.getAttribute("data-p");
  var chips = this.querySelectorAll(".chip");
  for(var i=0;i<chips.length;i++) chips[i].classList.remove("on");
  btn.classList.add("on");
  render();
};
document.getElementById("si").oninput = function(){
  kw = this.value.trim().toLowerCase();
  render();
};
</script>
