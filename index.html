<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>HQKV8 Learning + Trắc nghiệm</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#063a63">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#063a63;--blue:#0b67b2;--blue2:#eaf4ff;--gold:#d4a843;--green:#0f7c4a;--red:#c0392b;
  --bg:#f4f7fb;--card:#fff;--text:#14233b;--muted:#667085;--border:#dbe6f3;--shadow:0 8px 28px rgba(6,58,99,.08);
}
*{box-sizing:border-box}
body{margin:0;font-family:"Be Vietnam Pro",Arial,sans-serif;background:var(--bg);color:var(--text)}
button,input,select,textarea{font:inherit}
a{color:inherit}
.hidden{display:none!important}
.app{display:flex;min-height:100vh}
.sidebar{width:270px;background:linear-gradient(180deg,#063a63,#0b4f86);color:#fff;padding:18px 14px;position:sticky;top:0;height:100vh;overflow:auto}
.brand{display:flex;gap:12px;align-items:center;padding:12px 10px 18px;border-bottom:1px solid rgba(255,255,255,.18);margin-bottom:14px}
.logo{width:44px;height:44px;border-radius:13px;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;font-size:24px}
.brand b{font-size:1rem;line-height:1.25}
.brand span{display:block;font-size:.72rem;color:rgba(255,255,255,.72);margin-top:2px}
.nav-title{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.55);padding:12px 10px 6px}
.nav button{width:100%;border:0;background:transparent;color:rgba(255,255,255,.78);text-align:left;padding:11px 12px;border-radius:12px;cursor:pointer;font-weight:700;margin:2px 0}
.nav button:hover,.nav button.active{background:rgba(255,255,255,.14);color:#fff}
.nav button.active{box-shadow:inset 3px 0 0 var(--gold)}
.userbox{margin-top:18px;padding:12px;border-radius:16px;background:rgba(255,255,255,.1);font-size:.82rem}
.userbox b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.userbox small{display:block;color:rgba(255,255,255,.72);margin-top:4px}
.userbox button{margin-top:10px;width:100%;border:0;border-radius:10px;padding:9px;background:#fff;color:var(--navy);font-weight:800;cursor:pointer}
.main{flex:1;min-width:0}
.topbar{height:64px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:20}
.topbar h1{font-size:1.05rem;margin:0;color:var(--navy);text-transform:uppercase;letter-spacing:.02em}
.mobile-menu{display:none;border:0;background:var(--blue2);color:var(--navy);border-radius:10px;padding:8px 10px;font-weight:900}
.content{padding:24px;max-width:1500px;margin:0 auto}
.screen{display:none}
.screen.active{display:block}
.hero{background:linear-gradient(135deg,#063a63,#0b67b2);color:#fff;border-radius:24px;padding:26px;box-shadow:var(--shadow);display:flex;justify-content:space-between;gap:18px;align-items:center;margin-bottom:20px}
.hero h2{margin:0 0 8px;font-size:1.55rem}
.hero p{margin:0;color:rgba(255,255,255,.78)}
.hero .badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:16px;padding:14px 18px;text-align:center;min-width:140px}
.badge b{font-size:2rem;color:#ffdc72}
.grid{display:grid;gap:16px}
.grid.stats{grid-template-columns:repeat(4,minmax(150px,1fr))}
.grid.cards{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
.card{background:#fff;border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:18px}
.card h3{margin:0 0 10px;color:var(--navy)}
.stat{display:flex;gap:14px;align-items:center}
.stat i{width:48px;height:48px;border-radius:14px;background:var(--blue2);display:flex;align-items:center;justify-content:center;font-style:normal;font-size:24px}
.stat b{font-size:1.65rem;display:block;color:var(--navy)}
.stat span{color:var(--muted);font-size:.85rem}
.btn{border:0;border-radius:12px;padding:11px 16px;font-weight:800;cursor:pointer;background:var(--blue);color:#fff}
.btn.secondary{background:#eef4fd;color:var(--navy)}
.btn.gold{background:linear-gradient(135deg,#d4a843,#f2cc68);color:#231b09}
.btn.red{background:#fdecea;color:var(--red)}
.btn.green{background:#e6f7ef;color:var(--green)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.field{margin-bottom:12px}
.field label{font-weight:800;color:var(--navy);font-size:.82rem;text-transform:uppercase;display:block;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--border);border-radius:12px;padding:11px 12px;background:#fff;color:var(--text)}
.field textarea{min-height:120px;resize:vertical}
.login-screen{position:fixed;inset:0;background:linear-gradient(180deg,#063a63,#0b67b2);display:flex;align-items:center;justify-content:center;padding:18px;z-index:99}
.login-card{width:min(440px,100%);background:#fff;border-radius:24px;padding:28px;box-shadow:0 30px 70px rgba(0,0,0,.22)}
.login-card h2{margin:0 0 6px;color:var(--navy)}
.login-card p{margin:0 0 20px;color:var(--muted)}
.alert{padding:11px 13px;border-radius:12px;margin:12px 0;font-weight:700;font-size:.88rem}
.alert.err{background:#fdecea;color:var(--red)}
.alert.ok{background:#e6f7ef;color:var(--green)}
.course-card{display:flex;flex-direction:column;gap:12px;min-height:230px}
.course-meta{display:flex;gap:8px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:5px 10px;font-size:.75rem;font-weight:800;background:#eef4fd;color:var(--navy)}
.progress{height:10px;background:#e6edf7;border-radius:999px;overflow:hidden}
.progress div{height:100%;background:linear-gradient(90deg,var(--blue),#37a2d8);border-radius:999px}
.course-layout{display:grid;grid-template-columns:330px 1fr;gap:18px;align-items:start}
.lesson-list{position:sticky;top:82px}
.lesson-btn{width:100%;border:1px solid var(--border);background:#fff;border-radius:14px;padding:12px;text-align:left;margin-bottom:8px;cursor:pointer}
.lesson-btn.active{border-color:var(--blue);background:#eff7ff}
.lesson-btn.done{box-shadow:inset 4px 0 0 var(--green)}
.lesson-btn b{display:block;color:var(--navy)}
.lesson-btn span{display:block;color:var(--muted);font-size:.78rem;margin-top:4px}
.viewer{background:#fff;border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);overflow:hidden}
.viewer-head{padding:18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:12px;align-items:center}
.viewer-body{padding:18px}
.lesson-content{line-height:1.75}
.lesson-content h1,.lesson-content h2,.lesson-content h3{color:var(--navy)}
.embed{width:100%;height:70vh;border:1px solid var(--border);border-radius:16px;background:#f8fafc}
.quiz-layout{display:grid;grid-template-columns:310px 1fr;gap:18px}
.qnav{position:sticky;top:82px}
.qgrid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px}
.qdot{aspect-ratio:1;border:1px solid var(--border);background:#fff;border-radius:8px;cursor:pointer;font-weight:800}
.qdot.active{background:#fff4d5;border-color:var(--gold)}
.qdot.answered{background:#eaf4ff;border-color:var(--blue)}
.qtext{font-size:1.1rem;font-weight:800;line-height:1.6;margin-bottom:16px}
.opt{display:flex;gap:10px;align-items:flex-start;border:1.5px solid var(--border);padding:13px;border-radius:14px;margin-bottom:10px;cursor:pointer}
.opt.selected{background:#eef7ff;border-color:var(--blue)}
.opt input{margin-top:4px}
.result-row{border:1px solid var(--border);border-radius:14px;padding:14px;margin:10px 0}
.result-row.ok{border-left:5px solid var(--green)}
.result-row.bad{border-left:5px solid var(--red)}
.result-row.partial{border-left:5px solid var(--gold)}
.table-wrap{overflow:auto}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{border-bottom:1px solid var(--border);padding:10px;text-align:left;font-size:.88rem;vertical-align:top}
th{background:#eef4fd;color:var(--navy);font-size:.76rem;text-transform:uppercase}
.admin-json{font-family:ui-monospace,Consolas,monospace;min-height:330px}
.loading{position:fixed;inset:0;background:rgba(6,58,99,.35);display:flex;align-items:center;justify-content:center;z-index:200}
.loading-box{background:#fff;padding:22px 30px;border-radius:18px;box-shadow:var(--shadow);font-weight:800;color:var(--navy)}
@media(max-width:900px){
  .app{display:block}.sidebar{display:none;position:fixed;z-index:80;inset:0 auto 0 0}.sidebar.show{display:block}.mobile-menu{display:block}
  .topbar{padding:0 12px}.content{padding:14px}.hero{border-radius:18px;display:block}.hero .badge{margin-top:14px}
  .grid.stats{grid-template-columns:1fr 1fr}.course-layout,.quiz-layout{grid-template-columns:1fr}.lesson-list,.qnav{position:static}
  .embed{height:62vh}.qgrid{grid-template-columns:repeat(10,1fr)}
}
@media(max-width:520px){.grid.stats{grid-template-columns:1fr}.grid.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="login" class="login-screen">
  <div class="login-card">
    <h2>HQKV8 Learning</h2>
    <p>Đăng nhập để học bài giảng, làm trắc nghiệm và lưu tiến độ.</p>
    <div id="loginAlert" class="alert err hidden"></div>
    <div class="field"><label>Tài khoản/Mã CBCC</label><input id="loginUser" autocomplete="username"></div>
    <div class="field"><label>Mật khẩu</label><input id="loginPass" type="password" autocomplete="current-password"></div>
    <button class="btn" style="width:100%" onclick="App.login()">Đăng nhập</button>
    <button class="btn secondary" style="width:100%;margin-top:10px" onclick="App.guest()">Dùng thử không lưu kết quả</button>
  </div>
</div>

<div class="app">
  <aside id="sidebar" class="sidebar">
    <div class="brand"><div class="logo">🎓</div><div><b>HQKV8 Learning</b><span>Học tập · Trắc nghiệm · Lưu kết quả</span></div></div>
    <div class="nav">
      <div class="nav-title">Học tập</div>
      <button data-screen="dashboard" onclick="App.goto('dashboard')">🏠 Tổng quan</button>
      <button data-screen="courses" onclick="App.goto('courses')">📚 Khóa học</button>
      <button data-screen="assignments" onclick="App.goto('assignments')">📌 Khóa học được giao</button>
      <button data-screen="practice" onclick="App.goto('practice')">📝 Bài tập thực hành</button>
      <div class="nav-title">Trắc nghiệm</div>
      <button data-screen="quiz-setup" onclick="App.goto('quiz-setup')">▶ Làm bài trắc nghiệm</button>
      <button data-screen="my-stats" onclick="App.goto('my-stats')">📊 Kết quả của tôi</button>
      <button data-screen="all-stats" class="admin-only" onclick="App.goto('all-stats')">🏆 Kết quả toàn đơn vị</button>
      <div class="nav-title admin-only">Quản trị</div>
      <button data-screen="admin-import" class="admin-only" onclick="App.goto('admin-import')">⬆ Nhập khóa học JSON</button>
    </div>
    <div class="userbox">
      <b id="sideUser">—</b><small id="sideUnit">—</small>
      <button onclick="App.logout()">Đăng xuất</button>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <button class="mobile-menu" onclick="App.toggleMenu()">☰</button>
      <h1 id="pageTitle">Tổng quan</h1>
      <button class="btn secondary" onclick="App.reload()">Làm mới</button>
    </div>
    <div class="content">
      <section id="screen-dashboard" class="screen active"></section>
      <section id="screen-courses" class="screen"></section>
      <section id="screen-course-detail" class="screen"></section>
      <section id="screen-assignments" class="screen"></section>
      <section id="screen-practice" class="screen"></section>
      <section id="screen-quiz-setup" class="screen"></section>
      <section id="screen-quiz" class="screen"></section>
      <section id="screen-result" class="screen"></section>
      <section id="screen-my-stats" class="screen"></section>
      <section id="screen-all-stats" class="screen"></section>
      <section id="screen-admin-import" class="screen"></section>
    </div>
  </main>
</div>
<div id="loading" class="loading hidden"><div class="loading-box">Đang xử lý...</div></div>

<script>
/* Dán URL Web App Apps Script của anh vào đây */
const GAS_URL = 'PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE';

async function callGAS(p){
  if(!GAS_URL || GAS_URL.includes('PASTE_YOUR')) throw new Error('Chưa cấu hình GAS_URL trong index.html');
  const r = await fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(p) });
  if(!r.ok) throw new Error('HTTP '+r.status);
  return await r.json();
}
const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
const letter=i=>String.fromCharCode(65+i);
const scorePill=v=>{const n=Number(v)||0;const c=n>=7?'green':n>=5?'gold':'red';return `<span class="pill" style="background:${c==='green'?'#e6f7ef':c==='gold'?'#fff4d5':'#fdecea'};color:${c==='green'?'#0f7c4a':c==='gold'?'#9a6b00':'#c0392b'}">${n.toFixed(2)}</span>`};
const fmtDate=v=>{ if(!v) return '—'; const d=new Date(v); return isNaN(d)?esc(v):d.toLocaleString('vi-VN',{hour12:false}); };

const S={
  user:null, token:'', courses:[], currentCourse:null, currentLesson:null,
  banks:[], quiz:null, answers:{}, currentQ:0, timer:null, timeLeft:0,
  coursePracticeId:''
};

const App={
  init(){
    const saved=localStorage.getItem('hqkv8_lms_user');
    if(saved){
      try{ const obj=JSON.parse(saved); S.user=obj.user; S.token=obj.token||''; this.afterLogin(); }catch(e){}
    }
    this.setAdminVisible();
  },
  showLoading(v=true){document.getElementById('loading').classList.toggle('hidden',!v)},
  alertLogin(msg){const el=document.getElementById('loginAlert');el.textContent=msg;el.classList.remove('hidden')},
  async login(){
    try{
      this.showLoading();
      const username=document.getElementById('loginUser').value.trim();
      const password=document.getElementById('loginPass').value;
      const res=await callGAS({action:'loginSecure',username,password});
      this.showLoading(false);
      if(!res.ok) return this.alertLogin(res.msg||'Đăng nhập không thành công');
      S.user=res.user; S.token=res.token||res.user.token||'';
      localStorage.setItem('hqkv8_lms_user',JSON.stringify({user:S.user,token:S.token}));
      this.afterLogin();
    }catch(e){this.showLoading(false);this.alertLogin(e.message)}
  },
  guest(){
    S.user={username:'guest',fullname:'Khách',unit:'Không lưu',role:'user',isGuest:true};S.token='';
    this.afterLogin();
  },
  afterLogin(){
    document.getElementById('login').classList.add('hidden');
    document.getElementById('sideUser').textContent=S.user.fullname||S.user.username;
    document.getElementById('sideUnit').textContent=(S.user.unit||'')+' · '+(S.user.role||'user');
    this.setAdminVisible();
    this.goto('dashboard');
  },
  logout(){
    try{ if(S.token) callGAS({action:'logoutSecure',token:S.token}); }catch(e){}
    localStorage.removeItem('hqkv8_lms_user'); location.reload();
  },
  toggleMenu(){document.getElementById('sidebar').classList.toggle('show')},
  setAdminVisible(){
    const role=(S.user&&S.user.role)||'';
    document.querySelectorAll('.admin-only').forEach(el=>el.style.display=(role==='admin'||role==='lanh_dao_chi_cuc'||role==='lanh_dao_doi')?'block':'none');
  },
  title(t){document.getElementById('pageTitle').textContent=t},
  goto(screen){
    document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));
    document.getElementById('screen-'+screen).classList.add('active');
    document.querySelectorAll('.nav button').forEach(x=>x.classList.toggle('active',x.dataset.screen===screen));
    document.getElementById('sidebar').classList.remove('show');
    const map={dashboard:'Tổng quan',courses:'Khóa học',assignments:'Khóa học được giao',practice:'Bài tập thực hành','quiz-setup':'Làm bài trắc nghiệm','my-stats':'Kết quả của tôi','all-stats':'Kết quả toàn đơn vị','admin-import':'Nhập khóa học JSON'};
    this.title(map[screen]||'');
    if(screen==='dashboard') this.renderDashboard();
    if(screen==='courses') this.loadCourses();
    if(screen==='assignments') this.loadAssignments();
    if(screen==='practice') this.loadPractice();
    if(screen==='quiz-setup') this.loadBanks();
    if(screen==='my-stats') this.loadMyStats();
    if(screen==='all-stats') this.loadAllStats();
    if(screen==='admin-import') this.renderAdminImport();
  },
  reload(){ const active=[...document.querySelectorAll('.screen')].find(x=>x.classList.contains('active')); if(active) this.goto(active.id.replace('screen-','')); },

  async renderDashboard(){
    const el=document.getElementById('screen-dashboard');
    el.innerHTML=`<div class="hero"><div><h2>Xin chào, ${esc(S.user.fullname||S.user.username)}!</h2><p>Học bài giảng, làm trắc nghiệm và theo dõi tiến độ tập trung.</p></div><div class="badge"><b id="dashPct">0%</b><span>tiến độ TB</span></div></div><div id="dashBody"></div>`;
    try{
      const res=await callGAS({action:'getMyLearningDashboard',token:S.token,user:S.user});
      if(!res.ok) throw new Error(res.msg);
      const courses=res.courses||[];
      const avg=courses.length?Math.round(courses.reduce((s,c)=>s+(c.pct||0),0)/courses.length):0;
      document.getElementById('dashPct').textContent=avg+'%';
      document.getElementById('dashBody').innerHTML=`
        <div class="grid stats">
          <div class="card stat"><i>📚</i><div><b>${courses.length}</b><span>Khóa học</span></div></div>
          <div class="card stat"><i>✅</i><div><b>${courses.filter(c=>c.pct>=100).length}</b><span>Đã hoàn thành</span></div></div>
          <div class="card stat"><i>🧠</i><div><b>${(res.quizHistory||[]).length}</b><span>Lần trắc nghiệm</span></div></div>
          <div class="card stat"><i>📝</i><div><b>${(res.practiceSubmits||[]).length}</b><span>Bài tập đã nộp</span></div></div>
        </div>
        <div class="card"><h3>Khóa học gần đây</h3>${this.courseCards(courses.slice(0,6))}</div>`;
    }catch(e){document.getElementById('dashBody').innerHTML=`<div class="alert err">${esc(e.message)}</div>`}
  },

  courseCards(courses){
    if(!courses.length) return '<p style="color:var(--muted)">Chưa có khóa học.</p>';
    return `<div class="grid cards">${courses.map(c=>`
      <div class="card course-card">
        <div><h3>${esc(c.title)}</h3><p style="color:var(--muted)">${esc(c.desc||c.overview||'')}</p></div>
        <div class="course-meta"><span class="pill">${esc(c.group)}</span><span class="pill">${c.lessonCount||0} bài</span><span class="pill">${c.pct||0}%</span></div>
        <div class="progress"><div style="width:${c.pct||0}%"></div></div>
        <button class="btn" onclick="App.openCourse('${esc(c.id)}')">Vào học</button>
      </div>`).join('')}</div>`;
  },

  async loadCourses(){
    const el=document.getElementById('screen-courses');
    el.innerHTML='<div class="card">Đang tải khóa học...</div>';
    try{
      const res=await callGAS({action:'getCourses',token:S.token,user:S.user});
      if(!res.ok) throw new Error(res.msg);
      S.courses=res.courses||[];
      el.innerHTML=`<div class="hero"><div><h2>Danh sách khóa học</h2><p>Chọn một khóa để học theo bài, làm trắc nghiệm chương và lưu tiến độ.</p></div></div>${this.courseCards(S.courses)}`;
    }catch(e){el.innerHTML=`<div class="alert err">${esc(e.message)}</div>`}
  },

  async openCourse(courseId){
    this.goto('course-detail');
    const el=document.getElementById('screen-course-detail');
    el.innerHTML='<div class="card">Đang tải chi tiết khóa học...</div>';
    try{
      const res=await callGAS({action:'getCourseDetail',token:S.token,user:S.user,courseId});
      if(!res.ok) throw new Error(res.msg);
      S.currentCourse=res.course; S.currentCourse.lessons=res.lessons||[];
      const first=(res.lessons||[])[0]||null;
      el.innerHTML=this.courseDetailHtml(res.course,res.lessons||[],res.completed||0,res.total||0);
      if(first) this.showLesson(first.id);
    }catch(e){el.innerHTML=`<div class="alert err">${esc(e.message)}</div>`}
  },

  courseDetailHtml(c,lessons,completed,total){
    const pct=total?Math.round(completed/total*100):0;
    return `<div class="hero"><div><h2>${esc(c.title)}</h2><p>${esc(c.overview||c.desc||'')}</p><div class="course-meta" style="margin-top:12px">
      ${c.sourceUrl?`<a class="pill" href="${esc(c.sourceUrl)}" target="_blank">🔗 Link gốc</a>`:''}
      ${c.author?`<span class="pill">👤 ${esc(c.author)}</span>`:''}
      ${c.publishedAt?`<span class="pill">📅 ${esc(c.publishedAt)}</span>`:''}
      ${c.views?`<span class="pill">👁 ${esc(c.views)}</span>`:''}
      ${c.duration?`<span class="pill">⏱ ${esc(c.duration)}</span>`:''}
    </div></div><div class="badge"><b>${pct}%</b><span>${completed}/${total} bài</span></div></div>
    <div class="course-layout">
      <div class="card lesson-list">
        <h3>Mục lục khóa học</h3>
        ${lessons.map(l=>`<button id="lessonBtn-${esc(l.id)}" class="lesson-btn ${l.done?'done':''}" onclick="App.showLesson('${esc(l.id)}')"><b>${l.ord}. ${esc(l.title)}</b><span>${esc(l.type)} ${l.duration?' · '+esc(l.duration):''} ${l.bankId?' · có trắc nghiệm':''}</span></button>`).join('')}
      </div>
      <div class="viewer">
        <div class="viewer-head"><div><h3 id="lessonTitle">Bài học</h3><div id="lessonDesc" style="color:var(--muted)"></div></div><div id="lessonActions"></div></div>
        <div class="viewer-body" id="lessonBody"></div>
      </div>
    </div>`;
  },

  showLesson(lessonId){
    const l=(S.currentCourse.lessons||[]).find(x=>x.id===lessonId);
    if(!l) return;
    S.currentLesson=l;
    document.querySelectorAll('.lesson-btn').forEach(x=>x.classList.remove('active'));
    const b=document.getElementById('lessonBtn-'+CSS.escape(lessonId)); if(b) b.classList.add('active');
    document.getElementById('lessonTitle').textContent=(l.ord||'')+'. '+l.title;
    document.getElementById('lessonDesc').textContent=l.desc||'';
    document.getElementById('lessonActions').innerHTML=`
      ${l.bankId?`<button class="btn gold" onclick="App.startLessonQuiz()">Làm trắc nghiệm</button>`:''}
      <button class="btn green" onclick="App.markLessonDone()">Đánh dấu đã học</button>`;
    document.getElementById('lessonBody').innerHTML=this.renderLessonBody(l);
  },

  renderLessonBody(l){
    const type=(l.type||'').toLowerCase();
    if(l.html) return `<div class="lesson-content">${l.html}</div>`;
    if(!l.link) return `<div class="lesson-content"><p>Chưa có nội dung/link cho bài học này.</p></div>`;
    const embed=this.toEmbedUrl(l.link,type);
    if(type.includes('youtube')||l.link.includes('youtube.com')||l.link.includes('youtu.be')) return `<iframe class="embed" src="${esc(embed)}" allowfullscreen></iframe><p><a class="btn secondary" target="_blank" href="${esc(l.link)}">Mở video gốc</a></p>`;
    if(type.includes('pdf')||l.link.toLowerCase().includes('.pdf')||l.link.includes('drive.google.com')) return `<iframe class="embed" src="${esc(embed)}"></iframe><p><a class="btn secondary" target="_blank" href="${esc(l.link)}">Mở tài liệu trong tab mới</a></p>`;
    return `<iframe class="embed" src="${esc(l.link)}"></iframe><p><a class="btn secondary" target="_blank" href="${esc(l.link)}">Mở nội dung</a></p>`;
  },

  toEmbedUrl(url,type){
    try{
      if(url.includes('youtu.be/')) return 'https://www.youtube.com/embed/'+url.split('youtu.be/')[1].split(/[?&]/)[0];
      if(url.includes('youtube.com/watch')){ const u=new URL(url); return 'https://www.youtube.com/embed/'+u.searchParams.get('v'); }
      if(url.includes('drive.google.com/file/d/')){ const id=url.split('/file/d/')[1].split('/')[0]; return 'https://drive.google.com/file/d/'+id+'/preview'; }
      return url;
    }catch(e){return url}
  },

  async markLessonDone(){
    if(S.user.isGuest) return alert('Chế độ khách không lưu tiến độ.');
    try{
      const l=S.currentLesson;
      const res=await callGAS({action:'markLessonDone',token:S.token,courseId:S.currentCourse.id,lessonId:l.id});
      if(!res.ok) throw new Error(res.msg);
      alert('Đã lưu tiến độ học.');
      this.openCourse(S.currentCourse.id);
    }catch(e){alert(e.message)}
  },

  startLessonQuiz(){
    const l=S.currentLesson;
    this.goto('quiz-setup');
    setTimeout(()=>this.startQuiz(l.bankId,0,S.currentCourse.id,l.id),100);
  },

  async loadAssignments(){
    const el=document.getElementById('screen-assignments');
    if(S.user.isGuest){el.innerHTML='<div class="alert err">Chế độ khách không xem được khóa học được giao.</div>';return}
    el.innerHTML='<div class="card">Đang tải...</div>';
    try{
      const res=await callGAS({action:'getMyAssignments',token:S.token});
      if(!res.ok) throw new Error(res.msg);
      const rows=res.assignments||[];
      el.innerHTML=`<div class="card"><h3>Khóa học được giao</h3><div class="table-wrap"><table><thead><tr><th>Khóa học</th><th>Hạn</th><th>Tiến độ</th><th>Trạng thái</th><th></th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.courseTitle)}<br><small>${esc(r.note||'')}</small></td><td>${esc(r.due||'—')}</td><td><div class="progress"><div style="width:${r.pct}%"></div></div>${r.completed}/${r.total} bài (${r.pct}%)</td><td>${esc(r.status)}</td><td><button class="btn secondary" onclick="App.openCourse('${esc(r.courseId)}')">Vào học</button></td></tr>`).join('')}</tbody></table></div></div>`;
    }catch(e){el.innerHTML=`<div class="alert err">${esc(e.message)}</div>`}
  },

  async loadPractice(courseId=''){
    const el=document.getElementById('screen-practice');
    el.innerHTML='<div class="card">Đang tải bài tập...</div>';
    try{
      const res=await callGAS({action:'getPracticeTasks',token:S.token,user:S.user,courseId:courseId||S.coursePracticeId});
      if(!res.ok) throw new Error(res.msg);
      const tasks=res.tasks||[];
      el.innerHTML=`<div class="hero"><div><h2>Bài tập thực hành</h2><p>Làm bài tập vận dụng kiến thức đã học và tự lưu kết quả.</p></div></div>
      <div class="grid">${tasks.map(t=>this.practiceHtml(t)).join('')||'<div class="card">Chưa có bài tập.</div>'}</div>`;
    }catch(e){el.innerHTML=`<div class="alert err">${esc(e.message)}</div>`}
  },

  practiceHtml(t){
    return `<div class="card" id="task-${esc(t.id)}"><h3>${t.ord}. ${esc(t.title)}</h3>
      <p><b>Mục tiêu:</b> ${esc(t.goal)}</p><p><b>Bối cảnh:</b> ${esc(t.context)}</p><p><b>Yêu cầu:</b> ${esc(t.requirement)}</p>
      ${t.hint?`<p><b>Gợi ý:</b> ${esc(t.hint)}</p>`:''}${t.output?`<p><b>Sản phẩm:</b> ${esc(t.output)}</p>`:''}${t.criteria?`<p><b>Tiêu chí tự đánh giá:</b> ${esc(t.criteria)}</p>`:''}
      <div class="field"><label>Kết quả/ghi chú của tôi</label><textarea id="answer-${esc(t.id)}">${esc(t.submit&&t.submit.answer||'')}</textarea></div>
      <div class="field"><label>Tự đánh giá</label><select id="score-${esc(t.id)}"><option value="">Chọn mức</option><option ${t.submit&&t.submit.selfScore==='Cần hoàn thiện'?'selected':''}>Cần hoàn thiện</option><option ${t.submit&&t.submit.selfScore==='Đạt yêu cầu'?'selected':''}>Đạt yêu cầu</option><option ${t.submit&&t.submit.selfScore==='Tốt'?'selected':''}>Tốt</option></select></div>
      <button class="btn" onclick="App.savePractice('${esc(t.id)}')">Lưu bài làm</button>
      ${t.submit?`<span class="pill">Đã lưu: ${esc(t.submit.updatedAt||'')}</span>`:''}
    </div>`;
  },

  async savePractice(taskId){
    if(S.user.isGuest) return alert('Chế độ khách không lưu bài tập.');
    try{
      const answer=document.getElementById('answer-'+taskId).value;
      const selfScore=document.getElementById('score-'+taskId).value;
      const res=await callGAS({action:'savePracticeAnswer',token:S.token,taskId,answer,selfScore});
      if(!res.ok) throw new Error(res.msg);
      alert('Đã lưu bài tập.');
    }catch(e){alert(e.message)}
  },

  async loadBanks(){
    const el=document.getElementById('screen-quiz-setup');
    el.innerHTML='<div class="card">Đang tải ngân hàng câu hỏi...</div>';
    try{
      const res=await callGAS({action:'getBanks'});
      if(!res.ok) throw new Error(res.msg);
      S.banks=res.banks||[];
      const cats=[...new Set(S.banks.map(b=>b.linhVuc))];
      el.innerHTML=`<div class="hero"><div><h2>Làm bài trắc nghiệm</h2><p>Chọn lĩnh vực, bộ đề và số câu hỏi.</p></div></div>
      <div class="card" style="max-width:760px">
        <div class="field"><label>Lĩnh vực</label><select id="qCat" onchange="App.fillBankSelect()">${cats.map(c=>`<option>${esc(c)}</option>`).join('')}</select></div>
        <div class="field"><label>Bộ đề</label><select id="qBank"></select></div>
        <div class="field"><label>Số câu</label><select id="qCount"><option value="0">Toàn bộ câu hỏi</option><option>5</option><option>10</option><option>15</option><option>20</option><option>30</option></select></div>
        <button class="btn" onclick="App.startSelectedQuiz()">Bắt đầu làm bài</button>
      </div>`;
      this.fillBankSelect();
    }catch(e){el.innerHTML=`<div class="alert err">${esc(e.message)}</div>`}
  },
  fillBankSelect(){
    const cat=document.getElementById('qCat')?.value||'';
    const banks=S.banks.filter(b=>!cat||b.linhVuc===cat);
    document.getElementById('qBank').innerHTML=banks.map(b=>`<option value="${esc(b.id)}">${esc(b.name)} (${b.count} câu)</option>`).join('');
  },
  startSelectedQuiz(){
    const bankId=document.getElementById('qBank').value;
    const count=Number(document.getElementById('qCount').value||0);
    this.startQuiz(bankId,count,'','');
  },
  async startQuiz(bankId,count=0,courseId='',lessonId=''){
    try{
      this.showLoading();
      const res=await callGAS({action:'generateQuiz',bankId,count,courseId,lessonId,token:S.token,user:S.user});
      this.showLoading(false);
      if(!res.ok) throw new Error(res.msg);
      S.quiz=res; S.answers={}; S.currentQ=0; S.timeLeft=res.timeLimitSec||0;
      this.renderQuiz();
      this.goto('quiz');
      this.startTimer();
    }catch(e){this.showLoading(false);alert(e.message)}
  },
  renderQuiz(){
    const q=S.quiz.questions[S.currentQ];
    const el=document.getElementById('screen-quiz');
    el.innerHTML=`<div class="quiz-layout">
      <div class="card qnav"><h3>${esc(S.quiz.bankName)}</h3><p><b id="timer">--:--</b></p><div class="qgrid">${S.quiz.questions.map((_,i)=>`<button class="qdot ${i===S.currentQ?'active':''} ${S.answers[i]?'answered':''}" onclick="App.goQ(${i})">${i+1}</button>`).join('')}</div><button class="btn gold" style="width:100%;margin-top:14px" onclick="App.submitQuiz()">Nộp bài</button></div>
      <div class="card"><div class="qtext">Câu ${S.currentQ+1}. ${esc(q.question)}</div>${q.options.map((o,i)=>`<label class="opt ${this.isChosen(S.currentQ,i)?'selected':''}"><input type="checkbox" ${this.isChosen(S.currentQ,i)?'checked':''} onchange="App.choose(${i},this.checked)"> <b>${letter(i)}.</b> <span>${esc(o)}</span></label>`).join('')}<div style="display:flex;justify-content:space-between;margin-top:20px"><button class="btn secondary" ${S.currentQ===0?'disabled':''} onclick="App.goQ(S.currentQ-1)">← Câu trước</button><button class="btn secondary" ${S.currentQ===S.quiz.questions.length-1?'disabled':''} onclick="App.goQ(S.currentQ+1)">Câu sau →</button></div></div>
    </div>`;
    this.updateTimer();
  },
  isChosen(qi,oi){return (S.answers[qi]||[]).indexOf(oi)>=0},
  choose(oi,checked){
    const arr=S.answers[S.currentQ]||[];
    if(checked && arr.indexOf(oi)<0) arr.push(oi);
    if(!checked){ const idx=arr.indexOf(oi); if(idx>=0) arr.splice(idx,1); }
    S.answers[S.currentQ]=arr.sort((a,b)=>a-b);
    this.renderQuiz();
  },
  goQ(i){S.currentQ=Math.max(0,Math.min(i,S.quiz.questions.length-1));this.renderQuiz()},
  startTimer(){clearInterval(S.timer); if(!S.timeLeft) return; S.timer=setInterval(()=>{S.timeLeft--;this.updateTimer();if(S.timeLeft<=0){clearInterval(S.timer);this.submitQuiz()}},1000)},
  updateTimer(){const el=document.getElementById('timer'); if(!el) return; const m=Math.floor(S.timeLeft/60),s=S.timeLeft%60; el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')},
  async submitQuiz(forceSave=false){
    if(!confirm('Nộp bài trắc nghiệm?')) return;
    try{
      clearInterval(S.timer); this.showLoading();
      const res=await callGAS({action:'submitQuiz',token:S.token,user:S.user,quizId:S.quiz.quizId,userAnswers:S.answers,forceSave,courseId:S.quiz.courseId,lessonId:S.quiz.lessonId,guestMode:S.user.isGuest});
      this.showLoading(false);
      if(!res.ok) throw new Error(res.msg);
      if(res.promptSave && confirm(`Điểm ${Number(res.score10).toFixed(2)}/10 chưa đạt. Anh có muốn lưu kết quả không?`)) return this.submitQuiz(true);
      this.renderResult(res);
      this.goto('result');
    }catch(e){this.showLoading(false);alert(e.message)}
  },
  renderResult(res){
    const pct=res.totalQ?Math.round((res.correctCount/res.totalQ)*100):0;
    document.getElementById('screen-result').innerHTML=`<div class="hero"><div><h2>Kết quả trắc nghiệm</h2><p>${esc(res.bankName)} · ${res.saved?'Đã lưu kết quả':'Chưa lưu kết quả'}</p></div><div class="badge"><b>${Number(res.score10).toFixed(2)}</b><span>/10 điểm</span></div></div>
    <div class="grid stats"><div class="card stat"><i>✅</i><div><b>${res.correctCount}</b><span>Câu đúng</span></div></div><div class="card stat"><i>📌</i><div><b>${res.totalQ}</b><span>Tổng câu</span></div></div><div class="card stat"><i>🎯</i><div><b>${pct}%</b><span>Tỷ lệ đúng</span></div></div><div class="card stat"><i>💾</i><div><b>${res.saved?'Có':'Không'}</b><span>Lưu kết quả</span></div></div></div>
    <div class="card"><h3>Chi tiết đáp án</h3>${(res.detail||[]).map((r,i)=>`<div class="result-row ${r.score>=1?'ok':r.score>0?'partial':'bad'}"><b>Câu ${i+1}: ${esc(r.question)}</b><div style="margin-top:8px">${r.options.map((o,oi)=>`<div>${letter(oi)}. ${esc(o.text)} ${o.isCorrect?'✅':''} ${o.isChosen?'← chọn':''}</div>`).join('')}</div>${r.explain?`<p><i>Giải thích: ${esc(r.explain)}</i></p>`:''}</div>`).join('')}</div>`;
  },

  async loadMyStats(){
    const el=document.getElementById('screen-my-stats');
    el.innerHTML='<div class="card">Đang tải kết quả...</div>';
    try{
      const res=await callGAS({action:'getHistory',token:S.token,user:S.user,username:S.user.username,limit:300});
      if(!res.ok) throw new Error(res.msg);
      el.innerHTML=`<div class="card"><h3>Kết quả của tôi</h3>${this.resultsTable(res.rows||[])}</div>`;
    }catch(e){el.innerHTML=`<div class="alert err">${esc(e.message)}</div>`}
  },
  resultsTable(rows){
    return `<div class="table-wrap"><table><thead><tr><th>Thời gian</th><th>Bộ đề</th><th>Loại</th><th>Điểm</th><th>Khóa/Bài</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${fmtDate(r.time)}</td><td>${esc(r.banks)}</td><td>${esc(r.mode)}</td><td>${scorePill(r.score10)}</td><td>${esc(r.courseId||'')} ${r.lessonId?'/ '+esc(r.lessonId):''}</td></tr>`).join('')}</tbody></table></div>`;
  },
  async loadAllStats(){
    const el=document.getElementById('screen-all-stats');
    el.innerHTML='<div class="card">Đang tải báo cáo...</div>';
    try{
      const [quiz,course]=await Promise.all([callGAS({action:'getAllStats',token:S.token}),callGAS({action:'getCourseReport',token:S.token})]);
      if(!quiz.ok) throw new Error(quiz.msg);
      el.innerHTML=`<div class="grid stats"><div class="card stat"><i>👥</i><div><b>${quiz.stats.members||0}</b><span>Người dùng</span></div></div><div class="card stat"><i>🧠</i><div><b>${quiz.stats.exams||0}</b><span>Lượt thi</span></div></div><div class="card stat"><i>📈</i><div><b>${Number(quiz.stats.avg||0).toFixed(2)}</b><span>Điểm TB</span></div></div><div class="card stat"><i>✅</i><div><b>${quiz.stats.passRate||0}%</b><span>Tỷ lệ đạt</span></div></div></div>
      <div class="card"><h3>Xếp hạng trắc nghiệm</h3><div class="table-wrap"><table><thead><tr><th>Họ tên</th><th>Đơn vị</th><th>Lượt thi</th><th>Điểm cao nhất</th><th>Điểm TB</th></tr></thead><tbody>${(quiz.ranking||[]).map(r=>`<tr><td>${esc(r.fullname||r.username)}</td><td>${esc(r.unit)}</td><td>${r.exams}</td><td>${scorePill(r.best)}</td><td>${scorePill(r.avg)}</td></tr>`).join('')}</tbody></table></div></div>
      <div class="card"><h3>Tiến độ khóa học</h3><div class="table-wrap"><table><thead><tr><th>Họ tên</th><th>Đơn vị</th><th>Khóa học</th><th>Tiến độ</th></tr></thead><tbody>${(course.rows||[]).map(r=>`<tr><td>${esc(r.fullname)}</td><td>${esc(r.unit)}</td><td>${esc(r.courseTitle)}</td><td>${r.completed}/${r.total} (${r.pct}%)<div class="progress"><div style="width:${r.pct}%"></div></div></td></tr>`).join('')}</tbody></table></div></div>`;
    }catch(e){el.innerHTML=`<div class="alert err">${esc(e.message)}</div>`}
  },

  renderAdminImport(){
    const sample={
      course:{id:"AI001",group:"Phổ cập AI",title:"Khóa học AI từ YouTube",author:"Tên kênh",sourceUrl:"https://youtube.com/...",publishedAt:"...",views:"...",duration:"...",overview:"Tóm tắt khóa học"},
      chapters:[{title:"Chương 1 - Tổng quan",type:"pdf",link:"https://...",html:"",questions:[{question:"AI là gì?",options:["A","B","C","D"],answer:"A",explain:"..."}]}],
      finalQuiz:[{question:"Câu hỏi cuối khóa?",options:["A","B","C","D"],answer:"B"}],
      practiceTasks:[{title:"Viết prompt tóm tắt văn bản",goal:"...",context:"...",requirement:"...",hint:"...",output:"...",criteria:"..."}]
    };
    document.getElementById('screen-admin-import').innerHTML=`<div class="hero"><div><h2>Nhập khóa học từ JSON</h2><p>Dán course_data.json/quiz_bank.json đã xuất từ Gemini/ChatGPT để tạo khóa học, bài học, câu hỏi và bài tập.</p></div></div>
    <div class="card"><div class="field"><label>Dữ liệu JSON</label><textarea id="importJson" class="admin-json">${esc(JSON.stringify(sample,null,2))}</textarea></div><button class="btn" onclick="App.importJson()">Nhập vào Google Sheet</button><button class="btn secondary" onclick="App.setupSheets()">Tạo/kiểm tra sheet</button><div id="importMsg"></div></div>`;
  },
  async setupSheets(){
    try{const res=await callGAS({action:'setupLearningSheets',token:S.token});document.getElementById('importMsg').innerHTML=`<div class="alert ${res.ok?'ok':'err'}">${esc(res.msg)}</div>`}catch(e){alert(e.message)}
  },
  async importJson(){
    try{
      const txt=document.getElementById('importJson').value;
      const data=JSON.parse(txt);
      this.showLoading();
      const res=await callGAS({action:'importCourseData',token:S.token,data});
      this.showLoading(false);
      document.getElementById('importMsg').innerHTML=`<div class="alert ${res.ok?'ok':'err'}">${res.ok?`Đã nhập khóa học ${esc(res.courseId)}: ${res.lessons} bài, ${res.questions} câu hỏi, ${res.tasks} bài tập.`:esc(res.msg)}</div>`;
    }catch(e){this.showLoading(false);alert(e.message)}
  }
};
App.init();
</script>
</body>
</html>
