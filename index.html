<script>
// ═══════════════════════════════════════════════════
// CẤU HÌNH — HÃY THAY ĐỔI URL DƯỚI ĐÂY
// ═══════════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzRS6I51B4qejpdlaKNn6PfERL46ajU_pDiDPKbqUHZUF0lIuOCe8EYM-QNvKhUZOKl/exec';

async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function callGAS(p){
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 15000); 
  try {
    const r = await fetch(GAS_URL, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain'},
      body: JSON.stringify(p),
      signal: controller.signal
    });
    clearTimeout(timeoutId);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return await r.json();
  } catch (err) {
    clearTimeout(timeoutId);
    if (err.name === 'AbortError') {
      throw new Error('Mạng không ổn định hoặc hệ thống quá tải. Vui lòng thử lại!');
    }
    throw err;
  }
}

const S = {
  user: null, allBanks: [], mode: 'study', examCount: 30,
  quizData: null, answers: {}, timerIv: null, timeLeft: 0,
};

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const letter = i => String.fromCharCode(65+i);
const fmtDate = v => { if(!v) return '—'; const d=new Date(v); return `${d.getDate()}/${d.getMonth()+1} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
const scorePill = v => { const n=Number(v); const cls=n>=7?'score-high':n>=5?'score-mid':'score-low'; return `<span class="score-pill ${cls}">${n.toFixed(2)}</span>`; };

const canSeeAll  = r => ['admin','manager'].includes(r);
const canSeeUnit = r => ['admin','manager','truong_don_vi'].includes(r);

document.title = "Hệ thống Thi Trắc nghiệm - Chi cục Hải quan khu vực VIII";

const App = {
  init(){
    const saved = localStorage.getItem('qz_user');
    if(saved){ S.user=JSON.parse(saved); this.afterLogin(); }
    document.getElementById('loginPassword').addEventListener('keydown',e=>{ if(e.key==='Enter') this.login(); });
  },

  goto(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.getElementById('screen-'+id).classList.add('active');
    const navEl = document.getElementById('nav-'+id);
    if(navEl) navEl.classList.add('active');
    const titles = {dashboard:'Tổng quan','quiz-setup':'Làm bài thi',quiz:'Đang thi',result:'Kết quả bài thi','my-stats':'Thống kê của tôi','unit-stats':'Kết quả đơn vị','all-stats':'Toàn chi cục'};
    document.getElementById('topbarTitle').textContent = titles[id]||'';
    if(id==='dashboard') this.loadDashboard();
    if(id==='my-stats') this.loadMyStats();
    if(id==='unit-stats') this.loadUnitStats();
    if(id==='all-stats') this.loadAllStats();
    if(id==='quiz-setup') this.loadBanks();
    if(window.innerWidth<768) document.getElementById('sidebar').classList.remove('open');
  },

  toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); },
  showModal(id,show){ document.getElementById(id).classList.toggle('hidden',!show); },
  showLoading(msg='Đang xử lý...'){
    document.getElementById('loadingMsg').textContent=msg;
    document.getElementById('loadingOv').classList.remove('hidden');
  },
  hideLoading(){ document.getElementById('loadingOv').classList.add('hidden'); },
  showAlert(id,msg,type='error'){
    const el=document.getElementById(id);
    el.textContent=msg; el.className='alert alert-'+type;
  },
  hideAlert(id){ document.getElementById(id).className='alert alert-hidden'; },

  async login(){
    const username=document.getElementById('loginUsername').value.trim();
    const plainPass=document.getElementById('loginPassword').value;
    if(!username||!plainPass){ this.showLoginAlert('Vui lòng nhập đầy đủ','err'); return; }
    
    this.showLoading('Đang mã hóa & đăng nhập...');
    try{
      const hashedPass = await sha256(plainPass);
      const res = await callGAS({ action: 'login', username, password: hashedPass });
      
      if(!res.ok){ this.showLoginAlert(res.msg||'Sai tài khoản hoặc mật khẩu','err'); }
      else{
        S.user=res.user; localStorage.setItem('qz_user',JSON.stringify(res.user));
        this.hideLoginAlert();
        if(res.user.isDefaultPass){
          document.getElementById('chpwUsername').value=username;
          this.showModal('modal-chpw',true);
          this.showAlert('chpwAlert','Vui lòng đổi mật khẩu mặc định trước khi sử dụng','info');
        }
        this.afterLogin();
      }
    }catch(e){ this.showLoginAlert(e.message || 'Lỗi kết nối', 'err'); }
    this.hideLoading();
  },

  showLoginAlert(msg,type){
    const el=document.getElementById('loginAlert');
    el.textContent=msg; el.className='login-alert '+type;
  },
  hideLoginAlert(){ document.getElementById('loginAlert').className='login-alert hidden'; },

  afterLogin(){
    const u=S.user;
    document.getElementById('screen-login').classList.remove('active');
    document.getElementById('screen-login').style.display='none';
    document.getElementById('appLayout').style.display='flex';
    document.getElementById('sidebarAvatar').textContent=(u.fullname||u.username).charAt(0).toUpperCase();
    document.getElementById('sidebarName').textContent=u.fullname||u.username;
    document.getElementById('sidebarRole').textContent=this.roleLabel(u.role);
    document.getElementById('welcomeName').textContent='Xin chào, '+(u.fullname||u.username)+'!';
    document.getElementById('welcomeSub').textContent=u.role==='user'?'Chọn bài thi hoặc xem thống kê của bạn':'Quản lý kết quả và thống kê hệ thống';
    if(canSeeUnit(u.role)){
      document.getElementById('adminNavLabel').style.display='';
      document.getElementById('nav-unit-stats').style.display='';
    }
    if(canSeeAll(u.role)){
      document.getElementById('nav-all-stats').style.display='';
    }
    this.goto('dashboard');
  },

  roleLabel(r){ return {admin:'Quản trị viên',manager:'Quản lý',truong_don_vi:'Trưởng đơn vị',user:'Cán bộ'}[r]||r; },

  logout(){
    if(!confirm('Đăng xuất?')) return;
    S.user=null; localStorage.removeItem('qz_user');
    this.stopTimer();
    document.getElementById('appLayout').style.display='none';
    document.getElementById('screen-login').style.display='';
    document.getElementById('screen-login').classList.add('active');
  },

  async changePassword(){
    const u=document.getElementById('chpwUsername').value.trim();
    const o=document.getElementById('chpwOld').value;
    const n=document.getElementById('chpwNew').value;
    const c=document.getElementById('chpwConfirm').value;
    
    if(n!==c){ this.showAlert('chpwAlert','Mật khẩu xác nhận không khớp'); return; }
    if(n.length<6){ this.showAlert('chpwAlert','Mật khẩu mới phải ≥ 6 ký tự'); return; }
    
    this.showLoading('Đang mã hóa & xử lý...');
    try{
      const hashedOld = await sha256(o);
      const hashedNew = await sha256(n);
      const res = await callGAS({ action: 'changePassword', username: u, oldPassword: hashedOld, newPassword: hashedNew });
      
      if(res.ok){ 
        this.showAlert('chpwAlert','Đổi mật khẩu thành công!','success'); 
        setTimeout(()=>this.showModal('modal-chpw',false),1500); 
      }
      else this.showAlert('chpwAlert', res.msg||'Thất bại');
    }catch(e){ this.showAlert('chpwAlert', e.message || 'Lỗi kết nối'); }
    this.hideLoading();
  },

  async loadDashboard(){
    try{
      const res=await callGAS({action:'getHistory',username:S.user.username});
      if(!res.ok||!res.history.length){ document.getElementById('badgeTotalExams').textContent=0; return; }
      const h=res.history;
      document.getElementById('badgeTotalExams').textContent=h.length;
      const scores=h.map(x=>Number(x.score10)).filter(x=>!isNaN(x));
      const avg=scores.reduce((a,b)=>a+b,0)/scores.length;
      const best=Math.max(...scores);
      const pass=scores.filter(x=>x>=5).length;
      document.getElementById('ds-avg').textContent=avg.toFixed(1);
      document.getElementById('ds-best').textContent=best.toFixed(1);
      document.getElementById('ds-pass').textContent=pass;
      document.getElementById('ds-last').textContent=fmtDate(h[0].time);
      document.getElementById('dashHistoryBody').innerHTML=h.slice(0,10).map(row=>`
        <tr>
          <td>${fmtDate(row.time)}</td>
          <td><span style="font-size:.72rem;color:var(--text3)">${esc(row.type)}</span></td>
          <td style="max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(row.banks)}</td>
          <td style="text-align:center">${row.count}</td>
          <td style="text-align:center;font-weight:700">${Number(row.score10).toFixed(2)}</td>
          <td>${scorePill(row.score10)}</td>
        </tr>`).join('');
    }catch(e){}
  },

  async loadBanks(){
    // Xóa bộ nhớ tạm để luôn tải mới nhất từ Google Sheet
    S.allBanks = []; 
    try{
      const res=await callGAS({action:'getBanks'});
      if(res.ok){ S.allBanks=res.banks; this.renderBanks(res.banks); }
      else document.getElementById('bankGrid').innerHTML='<p style="color:var(--r1)">'+esc(res.msg)+'</p>';
    }catch(e){ document.getElementById('bankGrid').innerHTML='<p style="color:var(--r1)">Lỗi kết nối</p>'; }
  },

  renderBanks(banks){
    const grid = document.getElementById('bankGrid');
    if(!banks.length) {
      grid.innerHTML = '<p style="color:var(--text3)">Chưa có bộ đề</p>';
      return;
    }
    grid.innerHTML = banks.map(b => `
      <label class="bank-item">
        <input type="radio" name="selectedBank" value="${esc(b.id)}" onchange="App.syncBank(this)">
        <div style="flex:1">
          <div class="bank-name">${esc(b.name)}</div>
          <div class="bank-count">${b.count} câu hỏi</div>
          <div style="font-size:0.65rem; color:var(--text3); margin-top:4px; font-style:italic">
             ${b.d2 ? esc(b.d2) : 'Chưa thiết lập Dòng 2'}
          </div>
        </div>
      </label>
    `).join('');
  },

  filterBanks(kw){
    const f=S.allBanks.filter(b=>b.name.toLowerCase().includes(kw.toLowerCase()));
    this.renderBanks(f);
  },

  syncBank(inp){ 
    document.querySelectorAll('.bank-item').forEach(el => el.classList.remove('selected'));
    if(inp.checked) inp.closest('.bank-item').classList.add('selected');
  },

  setMode(m){
    S.mode=m;
    document.getElementById('modeStudy').classList.toggle('active',m==='study');
    document.getElementById('modeExam').classList.toggle('active',m==='exam');
    document.getElementById('studyCountRow').style.display=m==='study'?'':'none';
    document.getElementById('examCountRow').style.display=m==='exam'?'':'none';
  },

  setExamCount(n,btn){
    S.examCount=n;
    document.querySelectorAll('.count-chips .chip').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active');
  },

  async startQuiz(){
    const selectedInp = document.querySelector('input[name="selectedBank"]:checked');
    if(!selectedInp) {
      this.showAlert('dashAlert', 'Vui lòng chọn 1 bộ đề để bắt đầu');
      return;
    }
    
    const bankId = selectedInp.value;
    let count = S.mode === 'study' ? parseInt(document.getElementById('studyCount').value) : S.examCount;

    if(S.mode === 'study' && (!count || count < 5 || count > 500)){ 
      this.showAlert('dashAlert','Số câu ôn tập phải từ 5 đến 500'); 
      return; 
    }

    this.hideAlert('dashAlert');
    this.showLoading('Đang bốc đề...');
    try{
      const res=await callGAS({action:'generateQuiz', username:S.user.username, bankId:bankId, mode:S.mode, count:count});
      
      if(!res.ok){ this.showAlert('dashAlert',res.msg); this.hideLoading(); return; }
      
      S.quizData=res; S.answers={};
      
      // An toàn hiển thị Text để tránh bị undefined nếu File Google Sheet trống
      document.getElementById('line1').textContent = res.headerLines.d1 || 'CỤC HẢI QUAN / ĐẢNG BỘ';
      document.getElementById('line2').textContent = res.headerLines.d2 || 'CHI CỤC KHU VỰC VIII';
      document.getElementById('line3').textContent = res.headerLines.d3 || 'BÀI THI TRẮC NGHIỆM';

      this.hideLoading();
      this.renderQuiz(res);
    }catch(e){ this.showAlert('dashAlert', e.message || 'Lỗi kết nối'); this.hideLoading(); }
  },

  renderQuiz(q){
    document.getElementById('totalCount').textContent=q.count;
    document.getElementById('answeredCount').textContent=0;
    if(q.mode==='exam'&&q.count){ 
      const timeSecs = q.count * 60;
      document.getElementById('timerInfo').textContent=`Kiểm tra – ${q.count} câu`;
      this.startTimer(timeSecs);
    } else {
      document.getElementById('timerClock').textContent='∞';
      document.getElementById('timerFill').style.width='100%';
      document.getElementById('timerInfo').textContent='Ôn tập – Không giới hạn';
    }
    document.getElementById('qDots').innerHTML=q.questions.map((_,i)=>`<button class="q-dot" id="dot-${i}" onclick="App.scrollToQ(${i})">${i+1}</button>`).join('');
    document.getElementById('quizBody').innerHTML=q.questions.map((q2,i)=>`
      <div class="qblock" id="qb-${i}">
        <div class="qnum">Câu ${i+1} / ${q.count}</div>
        <div class="qtext">${esc(q2.question)}</div>
        ${q2.options.map((opt,o)=>`
          <label class="opt" id="opt-${i}-${o}">
            <input type="checkbox" value="${o}" onchange="App.pickOpt(${i},${o},this.checked,this.closest('.opt'))">
            <span>${letter(o)}. ${esc(opt)}</span>
          </label>`).join('')}
      </div>`).join('');
    this.goto('quiz');
    document.getElementById('nav-quiz-setup').classList.remove('active');
  },

  pickOpt(qi,oi,checked,el){
    if(!S.answers[qi]) S.answers[qi]=[];
    if(checked){ if(!S.answers[qi].includes(oi)) S.answers[qi].push(oi); }
    else { S.answers[qi]=S.answers[qi].filter(x=>x!==oi); }
    el.classList.toggle('selected',checked);
    document.getElementById('dot-'+qi).classList.toggle('answered',S.answers[qi].length>0);
    document.getElementById('answeredCount').textContent=Object.values(S.answers).filter(a=>a.length>0).length;
  },
  scrollToQ(i){ document.getElementById('qb-'+i).scrollIntoView({behavior:'smooth'}); },

  startTimer(total){
    S.timeLeft=total; this.updateTimer(total,total);
    S.timerIv=setInterval(()=>{
      S.timeLeft--;
      this.updateTimer(S.timeLeft,total);
      if(S.timeLeft===60) this.showTimerBanner('⚠️ Còn 1 phút! Kiểm tra lại bài.');
      if(S.timeLeft<=0){ this.stopTimer(); this.lockQuiz(); this.showCountdown(); }
    },1000);
  },
  updateTimer(left,total){
    const m=String(Math.floor(left/60)).padStart(2,'0'),s=String(left%60).padStart(2,'0');
    const cl=document.getElementById('timerClock'),fi=document.getElementById('timerFill');
    cl.textContent=`${m}:${s}`;
    fi.style.width=(left/total*100)+'%';
    const warn=left<=total*.25,danger=left<=60;
    cl.className='timer-clock'+(danger?' danger':warn?' warning':'');
    fi.className='timer-fill'+(danger?' danger':warn?' warning':'');
  },
  stopTimer(){ if(S.timerIv){ clearInterval(S.timerIv); S.timerIv=null; } },
  lockQuiz(){
    document.querySelectorAll('#quizBody input').forEach(i=>i.disabled=true);
    const b=document.querySelector('.btn-submit');
    if(b){b.disabled=true;b.textContent='⏰ Đang nộp tự động...';}
  },
  showTimerBanner(msg){
    let el=document.getElementById('timerBanner');
    if(!el){
      el=document.createElement('div'); el.id='timerBanner';
      el.style.cssText='position:fixed;top:66px;left:50%;transform:translateX(-50%);z-index:600;background:#d4600a;color:#fff;padding:9px 20px;border-radius:8px;font-size:.83rem;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.2);white-space:nowrap';
      document.body.appendChild(el);
    }
    el.textContent=msg; el.style.display='block';
    clearTimeout(el._t); el._t=setTimeout(()=>el.style.display='none',4000);
  },
  showCountdown(){
    let ov=document.getElementById('cdOverlay');
    if(!ov){
      ov=document.createElement('div'); ov.id='cdOverlay';
      ov.style.cssText='position:fixed;inset:0;z-index:900;background:rgba(10,22,40,.8);display:flex;align-items:center;justify-content:center';
      ov.innerHTML='<div style="background:#fff;border-radius:16px;padding:36px 44px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.3)">'+
        '<div style="font-size:2.8rem;margin-bottom:10px">⏰</div>'+
        '<h2 style="font-size:1.1rem;font-weight:800;color:#0f1f3d;margin-bottom:8px">Hết giờ làm bài!</h2>'+
        '<p style="color:#4a5c7a;font-size:.85rem;margin-bottom:16px">Bài thi sẽ tự động nộp sau</p>'+
        '<div id="cdNum" style="font-size:4rem;font-weight:800;color:#c0392b;line-height:1">3</div>'+
        '<p style="color:#8496b0;font-size:.75rem;margin-top:4px">giây</p></div>';
      document.body.appendChild(ov);
    }
    ov.style.display='flex';
    let n=3;
    const t=setInterval(()=>{ n--; const el=document.getElementById('cdNum'); if(el) el.textContent=n; if(n<=0){ clearInterval(t); ov.style.display='none'; this.submitQuiz(); }},1000);
  },

  confirmSubmit(){
    const total=S.quizData.count, ans=Object.values(S.answers).filter(a=>a.length>0).length;
    const left=total-ans;
    const msg=left>0?`Còn ${left} câu chưa trả lời. Vẫn nộp bài?`:`Đã trả lời đủ ${total} câu. Nộp bài?`;
    if(confirm(msg)) this.submitQuiz();
  },

  async submitQuiz(){
    this.stopTimer();
    this.showLoading('Đang chấm bài...');
    try{
      const res=await callGAS({
        action:'submitQuiz',
        quizId:S.quizData.quizId,
        userAnswers:S.answers,
        user: S.user  
      });
      this.hideLoading();
      if(!res.ok){ alert('Lỗi nộp bài: '+(res.msg||'Không xác định')); return; }
      this.renderResult(res);
    }catch(e){ this.hideLoading(); alert('Lỗi kết nối khi nộp bài: ' + e.message); }
  },

  renderResult(res){
    const {correctCount, score10, totalQ, detail, lateSubmit} = res;
    document.getElementById('resultScore').textContent=correctCount+' / '+totalQ;
    document.getElementById('resultScore10').textContent='Hệ 10: '+Number(score10).toFixed(2);
    document.getElementById('resultMeta').textContent=(S.mode==='exam'?'📝 Kiểm tra':'📖 Ôn tập') + ' | ' + (S.quizData?.headerLines?.d3 || '');
    
    const pct=Math.round(Number(score10)/10*100);
    const circ=2*Math.PI*38; const dash=(pct/100)*circ;
    document.getElementById('donutProg').setAttribute('stroke-dasharray',`${dash} ${circ}`);
    document.getElementById('donutPct').textContent=pct+'%';
    
    const full=detail.filter(d=>d.score>=0.999).length;
    const zero=detail.filter(d=>d.score===0).length;
    const part=totalQ-full-zero;
    document.getElementById('rs-correct').textContent=full;
    document.getElementById('rs-wrong').textContent=zero;
    document.getElementById('rs-partial').textContent=part;
    document.getElementById('lateBanner').style.display=lateSubmit?'block':'none';
    
    document.getElementById('resultDetail').innerHTML=detail.map((d,i)=>{
      const sc=d.score; const pctQ=sc/1;
      const cls=pctQ>=0.999?'full':pctQ>0?'partial':'wrong';
      const scCls=pctQ>=0.999?'s-full':pctQ>0?'s-partial':'s-zero';
      const opts=d.options.map((o,oi)=>{
        let c2='',ic='';
        if(o.isCorrect&&o.isChosen){c2='ok';ic='✓';}
        else if(!o.isCorrect&&o.isChosen){c2='bad';ic='✗';}
        else if(o.isCorrect&&!o.isChosen){c2='missed';ic='!';}
        return `<div class="ropt ${c2}"><span style="flex-shrink:0;font-size:.78rem">${ic||'·'}</span><span>${letter(oi)}. ${esc(o.text)}</span></div>`;
      }).join('');
      const expl=d.explain?`<div class="rexplain">💡 ${esc(d.explain)}</div>`:'';
      return `<div class="rq ${cls}"><div class="rq-hd"><span class="rq-num">Câu ${i+1}</span><span class="rq-score ${scCls}">${d.score.toFixed(3)} điểm</span></div><div class="rq-text">${esc(d.question)}</div>${opts}${expl}</div>`;
    }).join('');
    this.goto('result');
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  },

  async loadMyStats(){
    document.getElementById('myHistoryBody').innerHTML='<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text3)">Đang tải...</td></tr>';
    try{
      const res=await callGAS({action:'getHistory',username:S.user.username});
      if(!res.ok||!res.history.length){ document.getElementById('myHistoryBody').innerHTML='<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text3)">Chưa có dữ liệu</td></tr>'; return; }
      const h=res.history;
      const scores=h.map(x=>Number(x.score10)).filter(x=>!isNaN(x));
      const avg=scores.length?scores.reduce((a,b)=>a+b,0)/scores.length:0;
      const best=scores.length?Math.max(...scores):0;
      const passRate=scores.length?Math.round(scores.filter(x=>x>=5).length/scores.length*100):0;
      document.getElementById('ms-total').textContent=h.length;
      document.getElementById('ms-avg').textContent=avg.toFixed(1);
      document.getElementById('ms-best').textContent=best.toFixed(1);
      document.getElementById('ms-pass-rate').textContent=passRate+'%';
      document.getElementById('myHistoryBody').innerHTML=h.map((row,i)=>`<tr>
        <td><span class="rank-badge">${i+1}</span></td>
        <td>${fmtDate(row.time)}</td>
        <td style="font-size:.75rem;color:var(--text3)">${esc(row.type)}</td>
        <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(row.banks)}</td>
        <td style="text-align:center">${row.count}</td>
        <td style="text-align:center;font-weight:700">${Number(row.score10).toFixed(2)}</td>
        <td>${scorePill(row.score10)}</td></tr>`).join('');
    }catch(e){ document.getElementById('myHistoryBody').innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--r1);padding:20px">Lỗi kết nối</td></tr>'; }
  },

  async loadUnitStats(){
    if(!canSeeUnit(S.user.role)) return;
    document.getElementById('unitName').textContent=S.user.role==='truong_don_vi'?(S.user.unit||S.user.role):'Tất cả đơn vị';
    document.getElementById('unitStatsBody').innerHTML='<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text3)">Đang tải...</td></tr>';
    try{
      const res=await callGAS({action:'getUnitStats',role:S.user.role,unit:S.user.unit||S.user.role});
      if(!res.ok){ document.getElementById('unitStatsBody').innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--r1);padding:20px">'+esc(res.msg)+'</td></tr>'; return; }
      this.renderUnitTable(res.stats,'unitStatsBody','us-');
    }catch(e){ document.getElementById('unitStatsBody').innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--r1);padding:20px">Lỗi kết nối</td></tr>'; }
  },

  renderUnitTable(stats,tbodyId,pfx){
    if(!stats||!stats.length){ document.getElementById(tbodyId).innerHTML='<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text3)">Chưa có dữ liệu</td></tr>'; return; }
    const totalExams=stats.reduce((a,r)=>a+r.count,0);
    const totalAvg=stats.reduce((a,r)=>a+r.avg,0)/stats.length;
    const totalPass=stats.filter(r=>r.avg>=5).length;
    const members=stats.length;
    if(pfx){ document.getElementById(pfx+'members').textContent=members; document.getElementById(pfx+'exams').textContent=totalExams; document.getElementById(pfx+'avg').textContent=totalAvg.toFixed(1); document.getElementById(pfx+'pass').textContent=Math.round(totalPass/members*100)+'%'; }
    document.getElementById(tbodyId).innerHTML=stats.map((r,i)=>{
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      const rankCls=i<3?'gold-rank':'';
      return `<tr>
        <td><span class="rank-badge ${rankCls}">${i+1}</span> ${medal}</td>
        <td style="font-weight:600">${esc(r.fullname)}</td>
        <td style="font-size:.75rem;color:var(--text3)">${esc(r.username)}</td>
        <td style="text-align:center">${r.count}</td>
        <td>${scorePill(r.avg)}</td>
        <td style="text-align:center;font-weight:700">${Number(r.best).toFixed(2)}</td>
        <td style="text-align:center;font-size:.82rem">${r.pass}/${r.count}</td></tr>`;
    }).join('');
  },

  async loadAllStats(){
    if(!canSeeAll(S.user.role)) return;
    const unit=document.getElementById('filterUnit').value;
    const mode=document.getElementById('filterMode').value;
    const from=document.getElementById('filterFrom').value;
    const to=document.getElementById('filterTo').value;
    document.getElementById('allStatsBody').innerHTML='<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text3)">Đang tải...</td></tr>';
    try{
      const res=await callGAS({action:'getAllStats',filterUnit:unit,filterMode:mode,filterFrom:from,filterTo:to});
      if(!res.ok){ document.getElementById('allStatsBody').innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--r1);padding:20px">'+esc(res.msg)+'</td></tr>'; return; }
      if(res.units){
        const sel=document.getElementById('filterUnit');
        const cur=sel.value;
        sel.innerHTML='<option value="">— Tất cả đơn vị —</option>'+res.units.map(u=>`<option value="${esc(u)}">${esc(u)}</option>`).join('');
        sel.value=cur;
      }
      const stats=res.stats||[];
      document.getElementById('allStatsCount').textContent=stats.length+' người';
      const units=new Set(stats.map(r=>r.unit)).size;
      const people=stats.length;
      const exams=stats.reduce((a,r)=>a+r.count,0);
      const avg=people?stats.reduce((a,r)=>a+r.avg,0)/people:0;
      document.getElementById('as-units').textContent=units;
      document.getElementById('as-people').textContent=people;
      document.getElementById('as-exams').textContent=exams;
      document.getElementById('as-avg').textContent=avg.toFixed(1);
      const top3=stats.slice(0,3);
      document.getElementById('topRankHero').innerHTML=top3.map((r,i)=>`
        <div class="rank-card rank-${i+1}">
          <div class="rank-medal">${['🥇','🥈','🥉'][i]}</div>
          <div class="rank-name">${esc(r.fullname)}</div>
          <div class="rank-unit">${esc(r.unit)}</div>
          <div class="rank-score">${Number(r.avg).toFixed(1)}<span style="font-size:.7rem;font-weight:400;color:var(--text3)"> /10</span></div>
        </div>`).join('');
      document.getElementById('allStatsBody').innerHTML=stats.map((r,i)=>`<tr>
        <td><span class="rank-badge ${i<3?'gold-rank':''}">${i+1}</span></td>
        <td style="font-weight:600">${esc(r.fullname)}</td>
        <td style="font-size:.75rem;color:var(--text3)">${esc(r.unit||'—')}</td>
        <td style="text-align:center">${r.count}</td>
        <td>${scorePill(r.avg)}</td>
        <td style="text-align:center;font-weight:700">${Number(r.best).toFixed(2)}</td>
        <td style="text-align:center;font-size:.82rem">${Math.round(r.pass/r.count*100)}%</td></tr>`).join('');
    }catch(e){ document.getElementById('allStatsBody').innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--r1);padding:20px">Lỗi kết nối</td></tr>'; }
  },
};

App.init();
</script>
